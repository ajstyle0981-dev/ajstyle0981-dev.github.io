<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقعي الإخباري</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root[data-theme="dark"] {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2230;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #00d4d4;
    --accent2: #0099cc;
    --nav-bg: #0d1117;
    --hero-grad: linear-gradient(135deg, #0d1117 0%, #1a2a3a 100%);
  }
  :root[data-theme="light"] {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #d0d7de;
    --text: #1c2230;
    --muted: #57606a;
    --accent: #0099cc;
    --accent2: #007aaa;
    --nav-bg: #1c2230;
    --hero-grad: linear-gradient(135deg, #e0f0ff 0%, #cce8f4 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); transition: background .3s, color .3s; }

  /* NAV */
  nav {
    background: var(--nav-bg);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .nav-logo { color: var(--accent); font-weight: 900; font-size: 1.3rem; cursor: pointer; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a {
    color: #ccc; text-decoration: none; font-size: .95rem;
    transition: color .2s; cursor: pointer;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }

  /* SEARCH BAR */
  .search-bar {
    display: flex; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px; gap: 6px;
    transition: border .2s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: 'Cairo', sans-serif;
    font-size: .9rem; width: 160px;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 1rem; }

  /* TOGGLE */
  .theme-toggle {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; cursor: pointer;
    color: var(--text); font-size: .85rem; font-family: 'Cairo', sans-serif;
    transition: all .2s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* HERO BANNER */
  .hero-banner {
    background: var(--accent);
    color: #fff; text-align: center;
    padding: 8px; font-size: .9rem; font-weight: 600;
    letter-spacing: .5px;
  }

  /* PAGE SYSTEM */
  .page { display: none; }
  .page.active { display: block; }

  /* HOME HERO */
  .home-hero {
    background: var(--hero-grad);
    text-align: center; padding: 60px 2rem 50px;
    border-bottom: 1px solid var(--border);
  }
  .home-hero h1 { font-size: 2.8rem; font-weight: 900; color: var(--accent); margin-bottom: .5rem; }
  .home-hero p { color: var(--muted); font-size: 1.1rem; margin-bottom: 1.5rem; }
  .hero-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 25px; padding: 12px 32px;
    font-size: 1rem; font-family: 'Cairo', sans-serif;
    cursor: pointer; font-weight: 700; transition: background .2s, transform .15s;
  }
  .hero-btn:hover { background: var(--accent2); transform: translateY(-2px); }

  /* SECTION TITLE */
  .section-title {
    font-size: 1.5rem; font-weight: 900;
    color: var(--text); margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: .6rem;
  }
  .section-title::after {
    content: ''; flex: 1; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  /* CARDS GRID */
  .section { padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.2rem;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    transition: transform .2s, box-shadow .2s, border-color .2s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,212,212,.15); border-color: var(--accent); }
  .card-img {
    width: 100%; height: 160px; object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; background: var(--surface);
  }
  .card-body { padding: 1rem; }
  .card-tag {
    display: inline-block; background: var(--accent);
    color: #fff; font-size: .7rem; font-weight: 700;
    border-radius: 4px; padding: 2px 8px; margin-bottom: .5rem;
  }
  .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: .4rem; line-height: 1.5; }
  .card p { color: var(--muted); font-size: .85rem; line-height: 1.6; }
  .card-meta { color: var(--muted); font-size: .75rem; margin-top: .6rem; }

  /* SEARCH RESULTS */
  .search-results-info {
    color: var(--muted); font-size: .9rem; margin-bottom: 1rem;
  }
  .no-results {
    text-align: center; padding: 3rem; color: var(--muted);
    font-size: 1.1rem;
  }

  /* ARTICLE PAGE */
  .article-container { max-width: 760px; margin: 0 auto; padding: 2rem; }
  .article-back {
    display: inline-flex; align-items: center; gap: .4rem;
    color: var(--accent); cursor: pointer; font-size: .9rem;
    margin-bottom: 1.5rem; background: none; border: none;
    font-family: 'Cairo', sans-serif; text-decoration: none;
  }
  .article-back:hover { text-decoration: underline; }
  .article-tag {
    display: inline-block; background: var(--accent);
    color: #fff; font-size: .75rem; font-weight: 700;
    border-radius: 4px; padding: 3px 10px; margin-bottom: .8rem;
  }
  .article-title { font-size: 2rem; font-weight: 900; line-height: 1.4; margin-bottom: .8rem; }
  .article-meta { color: var(--muted); font-size: .85rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .article-hero-img {
    width: 100%; height: 280px;
    background: var(--surface); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem; margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }
  .article-content p { line-height: 1.9; margin-bottom: 1.2rem; color: var(--text); font-size: 1rem; }
  .article-content h2 { font-size: 1.3rem; font-weight: 700; margin: 1.5rem 0 .7rem; color: var(--accent); }

  /* COMMENTS */
  .comments-section { margin-top: 2.5rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
  .comments-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.2rem; }
  .comment-form { margin-bottom: 1.5rem; }
  .comment-form input,
  .comment-form textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: .9rem;
    margin-bottom: .7rem; outline: none; transition: border .2s;
    resize: vertical;
  }
  .comment-form input:focus,
  .comment-form textarea:focus { border-color: var(--accent); }
  .comment-submit {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 10px 24px; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: .9rem; font-weight: 700;
    transition: background .2s;
  }
  .comment-submit:hover { background: var(--accent2); }
  .comment {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem; margin-bottom: .8rem;
  }
  .comment-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; }
  .comment-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .85rem;
  }
  .comment-name { font-weight: 700; font-size: .9rem; }
  .comment-date { color: var(--muted); font-size: .75rem; margin-right: auto; }
  .comment-text { color: var(--text); font-size: .9rem; line-height: 1.6; }
  .no-comments { color: var(--muted); font-size: .9rem; text-align: center; padding: 1rem; }

  /* TECH CARD DESIGN */
  .tech-img {
    width: 100%; height: 160px;
    background: linear-gradient(135deg, #0a0e1a 0%, #0d2137 100%);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .tech-img::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 50%, rgba(0,212,212,.2) 0%, transparent 50%), radial-gradient(circle at 80% 50%, rgba(0,153,204,.2) 0%, transparent 50%);
    animation: pulse-bg 3s ease-in-out infinite alternate;
  }
  @keyframes pulse-bg { from { opacity: .5; } to { opacity: 1; } }
  .tech-ring { animation: spin-ring 6s linear infinite; transform-origin: center; }
  @keyframes spin-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .tech-blink { animation: blink 1.5s ease-in-out infinite; }
  .tech-blink:nth-child(2) { animation-delay: .5s; }
  .tech-blink:nth-child(3) { animation-delay: 1s; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

  /* FOOTER */
  footer {
    background: var(--nav-bg); border-top: 1px solid var(--border);
    text-align: center; padding: 1.5rem; color: var(--muted);
    font-size: .85rem; margin-top: 3rem;
  }
  footer span { color: var(--accent); }
</style>
</head>

      <p>وتتضمن المحطة مختبرات علمية ووحدات سكنية ومشاتل للزراعة الفضائية.</p>
      <h2>الخطط المستقبلية</h2>
      <p>تخطط الوكالات لإطلاق أول بعثة مأهولة دائمة إلى المحطة بحلول عام ٢٠٢٨.</p>`
    },
    {
      id: 7, category: 'world',
      tag: 'العالم', emoji: '🌍',
      title: 'آخر المستجدات في السودان',
      summary: 'تطورات متسارعة على الساحة السودانية وسط جهود دولية لإيجاد حل سياسي للأزمة.',
      date: '١٤ يونيو ٢٠٢٦', author: 'محمد أحمد',
      body: `<p>تشهد الساحة السودانية تطورات متسارعة في ظل الجهود الدولية والإقليمية.</p>
      <h2>الوضع الإنساني</h2>
      <p>تواصل المنظمات الدولية تقديم المساعدات الإنسانية للمتضررين في مختلف الولايات السودانية.</p>
      <h2>الجهود الدبلوماسية</h2>
      <p>تكثّف الدول المجاورة جهودها لجمع الأطراف على طاولة الحوار وتحقيق السلام.</p>
      <h2>آفاق المستقبل</h2>
      <p>يتطلع الشعب السوداني إلى مستقبل مستقر يحقق التنمية والازدهار.</p>`
    },
  ];

  const comments = {};
  let currentArticle = null;
  let prevPage = 'home';
  let currentCategory = 'home';

  function renderCards(list, containerId) {
    const el = document.getElementById(containerId);
    if (!list.length) { el.innerHTML = '<div class="no-results">لا توجد نتائج</div>'; return; }
    el.innerHTML = list.map(a => `
      <div class="card" onclick="openArticle(${a.id})">
        <div class="${a.emoji === 'TECH_SVG' ? 'tech-img' : 'card-img'}">${a.emoji === 'TECH_SVG' ? `<svg width='120' height='100' viewBox='0 0 120 100' fill='none' xmlns='http://www.w3.org/2000/svg'>
        <circle cx='60' cy='50' r='30' stroke='#00d4d4' stroke-width='1.5' stroke-dasharray='4 3' class='tech-ring'/>
        <circle cx='60' cy='50' r='18' stroke='#0099cc' stroke-width='1' opacity='.6'/>
        <circle cx='60' cy='50' r='6' fill='#00d4d4' class='tech-blink'/>
        <circle cx='60' cy='20' r='3' fill='#00d4d4' class='tech-blink'/>
        <circle cx='60' cy='80' r='3' fill='#00d4d4' class='tech-blink'/>
        <circle cx='30' cy='50' r='3' fill='#0099cc' class='tech-blink'/>
        <circle cx='90' cy='50' r='3' fill='#0099cc' class='tech-blink'/>
        <line x1='20' y1='30' x2='40' y2='50' stroke='#00d4d4' stroke-width='1' opacity='.5'/>
        <line x1='100' y1='30' x2='80' y2='50' stroke='#00d4d4' stroke-width='1' opacity='.5'/>
        <line x1='20' y1='70' x2='40' y2='50' stroke='#0099cc' stroke-width='1' opacity='.5'/>
        <line x1='100' y1='70' x2='80' y2='50' stroke='#0099cc' stroke-width='1' opacity='.5'/>
        <text x='60' y='54' text-anchor='middle' fill='#00d4d4' font-size='8' font-family='Cairo,sans-serif' font-weight='700'>TECH</text>
      </svg>` : a.emoji}</div>
        <div class="card-body">
          <span class="card-tag">${a.tag}</span>
          <h3>${a.title}</h3>
          <p>${a.summary}</p>
          <div class="card-meta">📅 ${a.date} · ✍️ ${a.author}</div>
        </div>
      </div>`).join('');
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
  }

  function goHome() {
    clearSearch();
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.getElementById('nav-home').classList.add('active');
    showPage('home');
    currentCategory = 'home';
  }

  function showCategory(cat) {
    clearSearch();
    currentCategory = cat;
    if (cat === 'home') { goHome(); return; }
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    const navEl = document.getElementById('nav-' + cat);
    if (navEl) navEl.classList.add('active');
    const labels = { technology: '💻 التكنولوجيا', sports: '⚽ الرياضة', world: '🌍 العالم' };
    document.getElementById('category-title').textContent = labels[cat] || cat;
    renderCards(articles.filter(a => a.category === cat), 'category-grid');
    prevPage = 'category';
    showPage('category');
  }

  function openArticle(id) {
    currentArticle = articles.find(a => a.id === id);
    if (!currentArticle) return;
    document.getElementById('article-content').innerHTML = `
      <span class="article-tag">${currentArticle.tag}</span>
      <h1 class="article-title">${currentArticle.title}</h1>
      <div class="article-meta">📅 ${currentArticle.date} · ✍️ ${currentArticle.author}</div>
      <div class="article-hero-img">${currentArticle.emoji}</div>
      <div class="article-content">${currentArticle.body}</div>
    `;
    renderComments(id);
    showPage('article');
  }

  function goBack() {
    showPage(prevPage === 'search' ? 'search' : (currentCategory === 'home' ? 'home' : 'category'));
  }

  function renderComments(articleId) {
    const list = comments[articleId] || [];
    const el = document.getElementById('comments-list');
    if (!list.length) { el.innerHTML = '<div class="no-comments">لا توجد تعليقات بعد — كن أول المعلقين!</div>'; return; }
    el.innerHTML = list.map(c => `
      <div class="comment">
        <div class="comment-header">
          <div class="comment-avatar">${c.name[0]}</div>
          <span class="comment-name">${c.name}</span>
          <span class="comment-date">${c.date}</span>
        </div>
        <div class="comment-text">${c.text}</div>
      </div>`).join('');
  }

  function addComment() {
    const name = document.getElementById('commentName').value.trim();
    const text = document.getElementById('commentText').value.trim();
    if (!name || !text || !currentArticle) return;
    if (!comments[currentArticle.id]) comments[currentArticle.id] = [];
    comments[currentArticle.id].unshift({ name, text, date: 'الآن' });
    document.getElementById('commentName').value = '';
    document.getElementById('commentText').value = '';
    renderComments(currentArticle.id);
  }

  function doSearch(q) {
    q = q.trim();
    if (!q) { if (document.getElementById('page-search').classList.contains('active')) goHome(); return; }
    prevPage = 'search';
    const results = articles.filter(a => a.title.includes(q) || a.summary.includes(q) || a.tag.includes(q));
    document.getElementById('search-info').textContent = `وجدنا ${results.length} نتيجة لـ "${q}"`;
    renderCards(results, 'search-grid');
    showPage('search');
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
  }

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isDark ? '🌙 ليلي' : '☀️ نهاري';
  }

  // Init
  renderCards(articles, 'featured-grid');
</script>
</body>
</html>
